server.port=3000

spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.url=jdbc:mysql://localhost:3306/kob?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# pgvector 数据源（用于 /ai/hint 检索向量库）
pgvector.url=jdbc:postgresql://127.0.0.1:15432/kob_ai
pgvector.username=cocodzh
pgvector.password=123

# DashScope (Qwen) API key用于生成向量，建议在本地环境变量中设置 dashscope.api.key 或 DASHSCOPE_API_KEY
dashscope.api.key=sk-4a7aee68bc0046eaa78e62c9f624a038

# DeepSeek API key 用于 AI 对话
deepseek.api.key=sk-631118100c8542ba88af8d3ba1c302bd

# 服务间通信地址配置
service.matching.url=http://127.0.0.1:3001
# Python AI 微服务
ai.python.url=http://127.0.0.1:3003
ai.service.python.base-url=http://127.0.0.1:3003
ai.service.python.enabled=true

# ===== Agentic RAG 配置 =====
ai.agentic.max-iterations=5
ai.agentic.global-timeout-ms=30000
ai.agentic.ood-threshold=0.65
ai.agentic.max-scratchpad-chars=8000
ai.agentic.max-retries=3

# ===== Phase 2: AI 后端路由配置 =====
# 可选值: java, python
ai.rag.backend=python
ai.agent.backend=python
# 是否允许 Python Agent 失败后降级到 Java 旧 Agent（默认关闭，避免回落到废弃 stub）
ai.agent.allow-java-fallback=false

# ===== Phase 3: A/B 测试配置 =====
ai.abtest.enabled=false
ai.abtest.python-traffic-percentage=0
ai.abtest.strategy=hash
